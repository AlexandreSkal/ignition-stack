services:
  # MongoDB - Banco de dados NoSQL para configs e dados históricos
  mongodb:
    image: mongo:7-jammy
    container_name: ignition-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - automation-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Edge Gateway - Coleta de dados e simulação de planta
  ignition-edge:
    image: inductiveautomation/ignition:8.3.4
    container_name: ignition-edge
    restart: unless-stopped
    ports:
      - "8088:8088"
      - "8043:8043"
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      GATEWAY_ADMIN_USERNAME: ${IGNITION_ADMIN_USERNAME}
      GATEWAY_ADMIN_PASSWORD: ${IGNITION_ADMIN_PASSWORD}
      IGNITION_EDITION: edge
      TZ: ${TZ}
    volumes:
      - ignition-edge-data:/usr/local/bin/ignition/data
      - ./edge-scripts:/scripts:ro
    networks:
      - automation-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ignition-edge.rule=Host(`edge.ironforge.beer`)"
      - "traefik.http.routers.ignition-edge.entrypoints=websecure"
      - "traefik.http.routers.ignition-edge.tls.certresolver=cloudflare"
      - "traefik.http.services.ignition-edge.loadbalancer.server.port=8088"

  # Mongo Express - Interface Web para MongoDB
  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    networks:
      - automation-net
    depends_on:
      mongodb:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mongo-express.rule=Host(`mongo.ironforge.beer`)"
      - "traefik.http.routers.mongo-express.entrypoints=websecure"
      - "traefik.http.routers.mongo-express.tls.certresolver=cloudflare"
      - "traefik.http.services.mongo-express.loadbalancer.server.port=8081"

  # Ignition Gateway Principal - SCADA + MES unificado
  ignition-gateway:
    image: inductiveautomation/ignition:8.3.4
    container_name: ignition-gateway
    restart: unless-stopped
    ports:
      - "8089:8088"
      - "8044:8043"
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      GATEWAY_ADMIN_USERNAME: ${IGNITION_ADMIN_USERNAME}
      GATEWAY_ADMIN_PASSWORD: ${IGNITION_ADMIN_PASSWORD}
      IGNITION_EDITION: standard
      TZ: ${TZ}
      IGNITION_MEMORY_MINHEAP: 2048m
      IGNITION_MEMORY_MAXHEAP: 8192m
    volumes:
      - ignition-gateway-data:/usr/local/bin/ignition/data
      - ./gateway-backups:/backups
      - ./gateway-scripts:/scripts:ro
    networks:
      - automation-net
    depends_on:
      ignition-edge:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ignition-gateway.rule=Host(`gateway.ironforge.beer`)"
      - "traefik.http.routers.ignition-gateway.entrypoints=websecure"
      - "traefik.http.routers.ignition-gateway.tls.certresolver=cloudflare"
      - "traefik.http.services.ignition-gateway.loadbalancer.server.port=8088"

networks:
  automation-net:
    external: true

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  ignition-edge-data:
    driver: local
  ignition-gateway-data:
    driver: local
